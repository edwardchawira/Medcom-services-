<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course learning — Medcom</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --teal: #1aa8a8;
            --teal-dark: #158a8a;
            --bg-light: #eef2f3;
            --border-light: #e2e8ec;
        }
        body { background: var(--bg-light); color: #2c3e50; }
        .logo-florence { color: #2c3e50; }
        .logo-academy { color: #1a9e9e; font-weight: bold; }
        .nav-link.active { color: #1a9e9e !important; font-weight: 600; }
        .learning-main { min-height: calc(100vh - 4rem); }
        .safe-area-pb { padding-bottom: max(0.75rem, env(safe-area-inset-bottom, 0px)); }
        /* Above sidebar (z-50) and backdrop (z-40); full-width bar must not clip on narrow screens */
        #learningFooterNav {
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body>
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-4">
                    <button type="button" id="openSidebarBtn" class="md:hidden p-2 rounded-lg text-gray-600 hover:bg-gray-100" aria-label="Open chapter menu">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <a href="index.html" class="flex-shrink-0 flex items-center no-underline text-inherit hover:opacity-90 transition-opacity">
                        <i class="fas fa-tint text-teal-600 text-2xl mr-2"></i>
                        <span class="text-xl font-bold"><span class="logo-florence">Med</span><span class="logo-academy">com</span></span>
                    </a>
                    <span id="mobileChapterTitle" class="md:hidden text-sm font-medium text-gray-700 truncate max-w-[140px]">Ch. 1</span>
                </div>
                <div class="hidden md:flex md:items-center md:space-x-6">
                    <a href="course-overview.html" class="text-sm text-teal-700 hover:text-teal-900 font-medium">← Course overview</a>
                    <a href="courses.html" class="nav-link text-gray-600 hover:text-teal-600 px-3 py-2 rounded-md text-sm font-medium">Courses</a>
                    <a href="my-learning.html" class="nav-link active text-gray-600 hover:text-teal-600 px-3 py-2 rounded-md text-sm font-medium">My Learning</a>
                </div>
            </div>
        </div>
    </nav>

    <div id="sidebarBackdrop" class="hidden fixed inset-0 bg-black bg-opacity-40 z-40 md:hidden"></div>

    <div class="flex learning-main max-w-7xl mx-auto relative">
        <!-- Left nav (Florence-style) -->
        <aside id="learningSidebar"
            class="fixed md:sticky md:top-16 top-0 left-0 z-50 w-72 max-w-[85vw] h-[calc(100vh-4rem)] md:h-[calc(100vh-4rem)] bg-white border-r border-gray-200 overflow-y-auto transform -translate-x-full md:translate-x-0 transition-transform duration-200 ease-out">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center md:block">
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wide">Course menu</p>
                    <p class="text-sm font-semibold text-gray-900 mt-1">Prompting &amp; medication</p>
                </div>
                <button type="button" id="closeSidebarBtn" class="md:hidden p-2 text-gray-500" aria-label="Close menu"><i class="fas fa-times"></i></button>
            </div>
            <nav class="p-3" aria-label="Chapters">
                <p class="text-xs font-semibold text-gray-500 px-2 mb-2">Chapters</p>
                <div id="chapterList" class="space-y-0.5"></div>
            </nav>
            <div class="p-4 border-t border-gray-100 text-xs text-gray-500">
                <p>Reference URLs (Florence) are listed in <code class="bg-gray-100 px-1 rounded">data/chapters.json</code> for mapping.</p>
            </div>
        </aside>

        <main class="flex-1 min-w-0 p-4 md:p-8 lg:pl-8 pb-28 md:pb-32">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
                <div>
                    <h1 id="mainChapterTitle" class="text-2xl font-bold text-gray-900">Chapter</h1>
                    <p id="mainChapterMeta" class="text-sm text-gray-600 mt-1"></p>
                </div>
                <div class="w-full sm:w-56">
                    <div class="flex justify-between text-xs text-gray-600 mb-1">
                        <span>Progress</span>
                        <span id="progressLabel">0%</span>
                    </div>
                    <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                        <div id="progressFill" class="h-full bg-teal-600 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <article class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 md:p-8">
                <div id="mainChapterBody" class="prose prose-sm max-w-none text-gray-800">
                    <p>Loading…</p>
                </div>
            </article>
        </main>
    </div>

    <!-- Fixed chapter nav: always visible while scrolling long chapters -->
    <footer id="learningFooterNav" class="fixed bottom-0 left-0 right-0 border-t border-gray-200 bg-white safe-area-pb" role="navigation" aria-label="Chapter navigation">
        <div class="max-w-7xl mx-auto px-2 sm:px-4 py-3 grid grid-cols-[auto_minmax(0,1fr)_auto] items-center gap-2 sm:gap-4">
            <button type="button" id="btnPrev" class="justify-self-start px-3 sm:px-5 py-2.5 rounded-lg border-2 border-gray-300 text-gray-700 font-medium hover:bg-gray-50 active:scale-[0.98] transition-transform disabled:opacity-40 disabled:cursor-not-allowed whitespace-nowrap">
                <i class="fas fa-chevron-left mr-1 sm:mr-2" aria-hidden="true"></i><span class="hidden sm:inline">Previous</span><span class="sm:hidden">Prev</span>
            </button>
            <p id="footerStepHint" class="text-center text-xs sm:text-sm text-gray-500 min-w-0 truncate px-1"></p>
            <button type="button" id="btnNext" class="justify-self-end px-3 sm:px-5 py-2.5 rounded-lg bg-teal-600 text-white font-semibold hover:bg-teal-700 active:scale-[0.98] transition-transform shadow-sm whitespace-nowrap min-w-[5.5rem] sm:min-w-0">
                <span id="btnNextLabel">Next</span><i id="btnNextIcon" class="fas fa-chevron-right ml-1 sm:ml-2" aria-hidden="true"></i>
            </button>
        </div>
    </footer>

    <script src="js/medication-course-data.js"></script>
    <script src="js/course-learning-app.js"></script>
</body>
</html>
