<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Medcom</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-teal: #1a9e9e;
            --primary-teal-hover: #2ab3b3;
            --teal: #1aa8a8;
            --bg-light: #eef2f3;
            --bg-white: #ffffff;
            --border-light: #e2e8ec;
            --text-primary: #2c3e50;
            --text-secondary: #6b7280;
            --radius: 12px;
            --radius-large: 14px;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        body {
            background-color: var(--bg-light);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .nav-link.active {
            color: var(--primary-teal) !important;
            font-weight: 600;
        }
        
        .logo-florence {
            color: var(--text-primary);
        }
        
        .logo-academy {
            color: var(--primary-teal);
            font-weight: bold;
        }
        
        .content-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 36px 32px 0;
        }
        
        .search-bar {
            width: 100%;
            height: 48px;
            background: var(--bg-white);
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            font-size: 16px;
            transition: border-color 0.2s ease;
        }
        
        .search-bar:focus-within {
            border-color: var(--primary-teal);
            box-shadow: 0 0 0 3px rgba(26, 158, 158, 0.1);
        }
        
        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            margin-left: 12px;
            color: var(--text-primary);
        }
        
        .search-bar input::placeholder {
            color: var(--text-secondary);
        }
        
        .filter-bar {
            width: 100%;
            height: 48px;
            background: var(--bg-white);
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }
        
        .filter-bar:hover {
            border-color: var(--primary-teal);
        }
        
        .filter-triangle {
            display: inline-block;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 8px solid var(--text-primary);
            margin-right: 12px;
            transition: transform 0.2s ease;
        }
        
        .filter-triangle.expanded {
            transform: rotate(90deg);
        }
        
        .filter-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .filter-panel.expanded {
            max-height: 200px;
            margin-top: 8px;
        }
        
        .recommended-section {
            background: #e8f5f5;
            border-radius: var(--radius-large);
            padding: 28px;
            margin-top: 24px;
        }
        
        .course-card {
            background: var(--bg-white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .course-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        
        .course-thumbnail {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: var(--radius) var(--radius) 0 0;
        }
        
        .course-thumbnail.highlighted {
            border: 3px solid #39ff14;
            box-sizing: border-box;
        }
        
        .btn-start {
            width: 100%;
            background: var(--bg-white);
            border: 1.5px solid var(--teal);
            color: var(--teal);
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px;
            padding: 11px;
            transition: all 0.2s ease;
        }
        
        .btn-start:hover {
            background: var(--teal);
            color: var(--bg-white);
        }
        
        .teal-banner {
            background: #0d7a7a;
            border-radius: var(--radius-large);
            padding: 28px 32px;
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .btn-white {
            background: var(--bg-white);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .btn-white:hover {
            background: #f8fafc;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex-shrink-0 flex items-center no-underline text-inherit hover:opacity-90 transition-opacity">
                        <i class="fas fa-tint text-teal-600 text-2xl mr-2"></i>
                        <span class="text-xl font-bold">
                            <span class="logo-florence">Med</span><span class="logo-academy">com</span>
                        </span>
                    </a>
                    <div class="hidden md:ml-8 md:flex md:space-x-8">
                        <a href="index.html" class="nav-link text-gray-600 hover:text-teal-600 px-3 py-2 rounded-md text-sm font-medium transition-colors">
                            <i class="fas fa-home mr-2"></i>Home
                        </a>
                        <a href="courses.html" class="nav-link active text-gray-600 hover:text-teal-600 px-3 py-2 rounded-md text-sm font-medium transition-colors">
                            <i class="fas fa-book-open mr-2"></i>Courses
                        </a>
                        <a href="collections.html" class="nav-link text-gray-600 hover:text-teal-600 px-3 py-2 rounded-md text-sm font-medium transition-colors">
                            <i class="fas fa-layer-group mr-2"></i>Collections
                        </a>
                        <a href="my-learning.html" class="nav-link text-gray-600 hover:text-teal-600 px-3 py-2 rounded-md text-sm font-medium transition-colors">
                            <i class="fas fa-graduation-cap mr-2"></i>My Learning
                        </a>
                        <a href="portfolio.html" class="nav-link text-gray-600 hover:text-teal-600 px-3 py-2 rounded-md text-sm font-medium transition-colors">
                            <i class="fas fa-briefcase mr-2"></i>Portfolio
                        </a>
                        <div class="relative">
                            <a href="#" class="nav-link text-gray-600 hover:text-teal-600 px-3 py-2 rounded-md text-sm font-medium transition-colors">
                                <i class="fas fa-user-circle mr-2"></i>My Account
                                <i class="fas fa-chevron-down ml-1 text-xs"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="content-container">
        <!-- Search Bar -->
        <div class="search-bar">
            <i class="fas fa-search text-gray-400"></i>
                <input id="searchInput" type="text" placeholder="Search courses">
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar" onclick="toggleFilter()">
            <span class="filter-triangle" id="filterTriangle"></span>
            <span class="text-gray-500">Filter courses</span>
        </div>

        <!-- Filter Panel (Hidden by default) -->
        <div class="filter-panel" id="filterPanel">
            <div class="bg-white border border-gray-200 rounded-lg p-4">
                    <div class="grid grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                            <select id="filterCategory" class="w-full border border-gray-300 rounded-md px-3 py-2">
                                <option value="">All</option>
                                <option value="Clinical">Clinical</option>
                                <option value="Clinical Practice">Clinical Practice</option>
                                <option value="Communication Skills">Communication Skills</option>
                                <option value="Complex Care">Complex Care</option>
                                <option value="Fundamentals">Fundamentals</option>
                                <option value="Health and Safety">Health and Safety</option>
                                <option value="Introduction to Care">Introduction to Care</option>
                                <option value="Legislation">Legislation</option>
                                <option value="Long Term Conditions">Long Term Conditions</option>
                                <option value="Management & Leadership / Professional">Management & Leadership / Professional</option>
                                <option value="Management Skills">Management Skills</option>
                                <option value="Medicines Management">Medicines Management</option>
                                <option value="Mental Health">Mental Health</option>
                                <option value="NHS Nursing">NHS Nursing</option>
                                <option value="Statutory and Mandatory">Statutory and Mandatory</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Audience</label>
                        <select id="filterAudience" class="w-full border border-gray-300 rounded-md px-3 py-2">
                            <option value="">All</option>
                            <option value="Care Assistant">Care Assistant</option>
                            <option value="Nurse">Nurse</option>
                            <option value="Other staff">Other staff</option>
                            <option value="Registered Manager">Registered Manager</option>
                            <option value="Senior Care Assistant">Senior Care Assistant</option>
                            <option value="Team Leader / Supervisor">Team Leader / Supervisor</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Duration</label>
                        <select id="filterDuration" class="w-full border border-gray-300 rounded-md px-3 py-2">
                            <option value="">Any</option>
                            <option value="0-10">0-10</option>
                            <option value="10-20">10-20</option>
                            <option value="20-30">20-30</option>
                            <option value="30-40">30-40</option>
                            <option value="40-60">40-60</option>
                            <option value="60+">60+</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Collection</label>
                        <select id="filterCollection" class="w-full border border-gray-300 rounded-md px-3 py-2">
                            <option value="">All</option>
                            <option value="Advanced Safeguarding collection (L3)">Advanced Safeguarding collection (L3)</option>
                            <option value="Care Essentials collection">Care Essentials collection</option>
                            <option value="Care Leader collection">Care Leader collection</option>
                            <option value="Pathway to Care collection">Pathway to Care collection</option>
                            <option value="Understanding Mental Health and Wellbeing in Care collection">Understanding Mental Health and Wellbeing in Care collection</option>
                        </select>
                    </div>
                    </div>

                    <div class="mt-4 flex justify-end gap-2">
                        <button id="clearFiltersBtn" class="px-4 py-2 rounded-md border border-gray-300 text-gray-700 hover:bg-gray-50 transition-colors">
                            Clear
                        </button>
                        <button id="applyFiltersBtn" class="px-4 py-2 rounded-md bg-teal-600 text-white hover:bg-teal-700 transition-colors">
                            Apply
                        </button>
                </div>
            </div>
        </div>

        <!-- Recommended Section -->
        <div class="recommended-section">
            <h2 class="text-2xl font-bold text-gray-900 mb-5">Recommended for you</h2>
            <div id="recommendedCourses" class="grid grid-cols-3 gap-4"></div>
        </div>

        <!-- All Courses -->
        <div class="mt-10">
            <h2 class="text-2xl font-bold text-gray-900 mb-5">All courses</h2>
            <div id="courseGrid" class="grid grid-cols-3 gap-4"></div>
        </div>

        <!-- Teal Banner -->
        <div class="teal-banner">
            <div>
                <h3 class="text-white text-xl font-semibold mb-2">Ready to expand your skills?</h3>
                <p class="text-white opacity-90">Browse our complete course catalog and find the perfect training for your career</p>
            </div>
            <button class="btn-white">Browse all courses</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function toggleFilter() {
            const panel = document.getElementById('filterPanel');
            const triangle = document.getElementById('filterTriangle');
            
            panel.classList.toggle('expanded');
            triangle.classList.toggle('expanded');
        }
    </script>
</body>
</html>
